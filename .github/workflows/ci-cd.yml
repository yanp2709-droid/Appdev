name: CI/CD

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - recovered-project
  push:
    branches:
      - main
      - master
      - develop
      - recovered-project
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BACKEND_DIR: Backend/laravel-12.x
  FLUTTER_DIR: Flutter

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          extensions: mbstring, xml, ctype, iconv, intl, dom, fileinfo, pdo_sqlite, sqlite3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Backend/laravel-12.x/package-lock.json

      - name: Create Laravel environment file
        run: cp .env.example .env

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: Backend/laravel-12.x
          composer-options: --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-scripts

      - name: Prepare Laravel environment
        run: |
          php artisan key:generate
          php artisan package:discover --ansi

      - name: Build Laravel frontend assets
        run: |
          npm ci
          npm run build

      - name: Run Laravel test suite
        run: php artisan test

  flutter-ci:
    name: Flutter CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.FLUTTER_DIR }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter app
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        run: flutter test

  backend-delivery:
    name: Backend Delivery
    runs-on: ubuntu-latest
    needs: backend-ci
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/recovered-project' || startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: Backend/laravel-12.x
          file: Backend/laravel-12.x/docker/php/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend-deploy:
    name: Backend Deploy
    runs-on: ubuntu-latest
    needs: backend-delivery
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/recovered-project'

    environment:
      name: production

    env:
      DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH != '' && vars.VPS_DEPLOY_PATH || '/opt/techquiz/backend' }}
      APP_PORT: ${{ vars.VPS_APP_PORT != '' && vars.VPS_APP_PORT || '8001' }}
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend:${{ github.ref == 'refs/heads/main' && 'latest' || github.ref_name }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check deployment configuration
        id: deploy-config
        shell: bash
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USERNAME }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          LARAVEL_ENV_FILE: ${{ secrets.LARAVEL_ENV_FILE }}
        run: |
          missing=()
          [[ -z "$SSH_HOST" ]] && missing+=("VPS_HOST")
          [[ -z "$SSH_USER" ]] && missing+=("VPS_USERNAME")
          [[ -z "$SSH_KEY" ]] && missing+=("VPS_SSH_KEY")
          [[ -z "$GHCR_USER" ]] && missing+=("GHCR_USERNAME")
          [[ -z "$GHCR_TOKEN" ]] && missing+=("GHCR_TOKEN")
          [[ -z "$LARAVEL_ENV_FILE" ]] && missing+=("LARAVEL_ENV_FILE")

          if (( ${#missing[@]} > 0 )); then
            printf 'deploy_ready=false\n' >> "$GITHUB_OUTPUT"
            printf 'missing_keys=%s\n' "$(IFS=,; echo "${missing[*]}")" >> "$GITHUB_OUTPUT"
            printf 'Deployment skipped because these GitHub Actions secrets are missing: %s\n' "${missing[*]}"
            exit 0
          fi

          printf 'deploy_ready=true\n' >> "$GITHUB_OUTPUT"

      - name: Note skipped deployment
        if: steps.deploy-config.outputs.deploy_ready != 'true'
        shell: bash
        run: |
          printf 'Backend deploy skipped. Add these GitHub environment secrets to enable it: %s\n' "${{ steps.deploy-config.outputs.missing_keys }}"

      - name: Configure SSH
        if: steps.deploy-config.outputs.deploy_ready == 'true'
        shell: bash
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_PORT: ${{ secrets.VPS_PORT }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment stack
        if: steps.deploy-config.outputs.deploy_ready == 'true'
        shell: bash
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_PORT: ${{ secrets.VPS_PORT }}
          SSH_USER: ${{ secrets.VPS_USERNAME }}
          LARAVEL_ENV_FILE: ${{ secrets.LARAVEL_ENV_FILE }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        run: |
          mkdir -p .deploy-tmp
          printf '%s' "$LARAVEL_ENV_FILE" > .deploy-tmp/.env
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -P "${SSH_PORT:-22}" deploy/vps/backend/docker-compose.yml "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/docker-compose.yml"
          scp -P "${SSH_PORT:-22}" deploy/vps/backend/deploy.sh "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/deploy.sh"
          scp -P "${SSH_PORT:-22}" .deploy-tmp/.env "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/.env"

      - name: Deploy backend to VPS
        if: steps.deploy-config.outputs.deploy_ready == 'true'
        shell: bash
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_PORT: ${{ secrets.VPS_PORT }}
          SSH_USER: ${{ secrets.VPS_USERNAME }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          APP_PORT: ${{ env.APP_PORT }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
        run: |
          printf '%s\n' "$GHCR_TOKEN" | ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "cd '$DEPLOY_PATH' && chmod +x deploy.sh && BACKEND_IMAGE='$BACKEND_IMAGE' APP_PORT='$APP_PORT' GHCR_USERNAME='$GHCR_USER' ./deploy.sh"

  flutter-delivery:
    name: Flutter Delivery
    runs-on: ubuntu-latest
    needs: flutter-ci
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/recovered-project' || startsWith(github.ref, 'refs/tags/')

    env:
      API_BASE_URL: ${{ vars.FLUTTER_API_BASE_URL != '' && vars.FLUTTER_API_BASE_URL || 'http://10.0.2.2:8001/api' }}

    defaults:
      run:
        working-directory: ${{ env.FLUTTER_DIR }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        run: flutter build apk --release --dart-define=API_BASE_URL=$API_BASE_URL

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: techquiz-android-apk
          path: Flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
